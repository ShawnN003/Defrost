services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: defrost_app
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql

  api:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: defrost_app
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

  tests:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm ci && cd backend && npm ci && cd .. && npx playwright install && npm run test"
    depends_on:
      - db
      - api
      - frontend

volumes:
  db_data: